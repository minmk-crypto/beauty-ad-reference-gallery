name: 주간 갱신 (수집 → 태깅 → 렌더 → 배포)

on:
  schedule:
    # 매주 월·수·금 03:00 KST (= 일·화·목 18:00 UTC)
    - cron: '0 18 * * 0,2,4'
  workflow_dispatch:        # 수동 실행(테스트용)

permissions:
  contents: write           # main 에 푸시

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 + 도구 설치
        run: |
          npm install
          npx playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y ffmpeg
          npm install -g @anthropic-ai/claude-code

      - name: 광고주 시트 동기화 (마케터 관리 시트 → config)
        env:
          # (선택) 시트 URL 을 config 에 커밋하지 않고 시크릿으로 주입하고 싶을 때만 설정.
          # 미설정이면 config.sources.meta.advertisers_sheet.url 을 사용한다.
          ADVERTISERS_SHEET_URL: ${{ secrets.ADVERTISERS_SHEET_URL }}
        run: node sync-advertisers.js || echo "::warning::광고주 시트 동기화 실패 — 기존 config 유지"

      - name: Meta 수집
        run: node collect-meta.js || echo "::warning::collect-meta 부분 실패(봇 차단 가능)"

      - name: TikTok 수집
        run: node collect-tiktok.js || echo "::warning::collect-tiktok 부분 실패(봇 차단 가능)"

      - name: 비전 태깅 (Claude Code OAuth)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node tag-ci.js

      - name: 머지 + 정리 + 렌더
        run: |
          node commit.js
          node prune.js
          node render.js

      - name: 커밋 & 푸시
        run: |
          git config user.name "beauty-gallery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 푸시 생략"
          else
            git commit -m "chore: 주간 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
